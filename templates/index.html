<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heim</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-layout">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>Heim</span>
                <button onclick="newChat()">+</button>
            </div>
            <div class="sidebar-list" id="sidebarList">
            </div>
        </div>
        <div class="container" id="container">
            <div class="landing" id="landing">
                <div class="landing-inner">
                    <div class="heim-title">Heim</div>
                    <div class="heim-sub">your companion that remembers</div>
                    <div class="landing-input-wrap">
                        <input type="text" id="userMessage" placeholder="talk with Heim..." autocomplete="off">
                        <button onclick="sendMessage()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="chat-view" id="chatView">
                <div class="chat-header">
                    <span class="header-name">Heim</span>
                    <span class="header-dot"></span>
                </div>
                <div class="chat-area" id="chatArea"></div>
                <div class="chat-input-wrap">
                    <div class="aurora-line" id="auroraLine"></div>
                    <input type="text" id="userMessageChat" placeholder="talk with Heim..." autocomplete="off">
                    <button onclick="sendMessage()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
